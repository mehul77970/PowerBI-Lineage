# Sponsorship channels — PARKED.
#
# This file controls the "❤️ Sponsor" button that GitHub shows on
# the repo's main page. While every line below is commented, the
# button is hidden — the file just sits here as scaffolding ready
# to activate.
#
# To turn it on:
#   1. Pick ONE channel (Buy Me a Coffee recommended for this
#      project — casual tip jar, one-time payments, no subscription
#      pressure, ~5% fee).
#   2. Register the account and note your username.
#   3. Uncomment the matching line below and fill in the username.
#   4. Commit → GitHub re-indexes within minutes and the Sponsor
#      button appears.
#
# Why commented-out rather than deleted: keeps the options visible
# for future-you. If Buy Me a Coffee turns out to be wrong for the
# project, flipping to GitHub Sponsors or Ko-fi is a one-line edit.

# buy_me_a_coffee: <bmc-username>
# github: <github-username-or-org>
# ko_fi: <ko-fi-username>
# custom: ["https://example.com/support"]
